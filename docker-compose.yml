services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MRIJA_DB_ROOT_PASSWORD:-change-this-root-password}
      MARIADB_DATABASE: ${MRIJA_DB_NAME:-mailreview}
      MARIADB_USER: ${MRIJA_DB_USER:-mailreview}
      MARIADB_PASSWORD: ${MRIJA_DB_PASSWORD:-change-this-app-password}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MRIJA_DB_NAME:-mailreview}
      DB_USER: ${MRIJA_DB_USER:-mailreview}
      DB_PASS: ${MRIJA_DB_PASSWORD:-change-this-app-password}
    stdin_open: true
    tty: true
    command: bash

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MRIJA_WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./web:/app/web
      - ./web/config/local.php.docker:/app/web/config/local.php
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MRIJA_DB_NAME:-mailreview}
      DB_USER: ${MRIJA_DB_USER:-mailreview}
      DB_PASS: ${MRIJA_DB_PASSWORD:-change-this-app-password}
      COWORKER_PASSWORD_HASH: ${COWORKER_PASSWORD_HASH:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    command: php -S 0.0.0.0:8080 -t /app/web/public

volumes:
  mariadb_data:
