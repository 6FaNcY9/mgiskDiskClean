# .github/workflows/build-windows-exe.yml
# Builds MrijaArchive.exe (pure Python — FastAPI + pywebview, no PHP/Docker)
# Trigger: push to feature/docker-free-windows-client or main, or manual.
# Download from: Actions tab → latest run → Artifacts → MrijaArchive-exe

name: Build Windows EXE

on:
  push:
    branches:
      - feature/docker-free-windows-client
      - main
    paths:
      - 'launcher/windows/**'
      - 'src/mrija_client/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: launcher/windows
        run: python -m pip install -r requirements.txt

      - name: Build exe
        working-directory: launcher/windows
        run: pyinstaller app.spec --noconfirm

      - name: Verify exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "launcher\windows\dist\MrijaArchive.exe")) {
            Write-Error "MrijaArchive.exe not found"
            exit 1
          }
          Write-Output "Build size: $((Get-Item 'launcher\windows\dist\MrijaArchive.exe').Length) bytes"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: MrijaArchive-exe
          path: launcher/windows/dist/MrijaArchive.exe
          retention-days: 30
